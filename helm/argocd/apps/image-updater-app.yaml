apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argocd-image-updater
    targetRevision: "0.9.6"
    helm:
      values: |
        config:
          registries:
            - name: ECR
              api_url: https://<account>.dkr.ecr.<region>.amazonaws.com
              prefix: <account>.dkr.ecr.<region>.amazonaws.com
              credentials: ext:/scripts/ecr-auth.sh
              credsexpire: 10h
        authScripts:
          enabled: true
          scripts:
            ecr-auth.sh: |
              #!/bin/sh
              aws ecr get-login-password --region <region> | \
                echo "AWS:$(cat)"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
