kube-prometheus-stack:
  grafana:
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - grafana.example.com  # override per deployment
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.example.com
    defaultDashboardsEnabled: true
    persistence:
      enabled: true
      size: 5Gi

  prometheus:
    prometheusSpec:
      retention: 15d  # override to 30d in prod
      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 50Gi
      additionalScrapeConfigs:
        - job_name: demo-app
          kubernetes_sd_configs:
            - role: pod
              namespaces:
                names:
                  - demo-app-dev
                  - demo-app-staging
                  - demo-app-prod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
              action: keep
              regex: demo-app

  alertmanager:
    enabled: false  # enable and configure per team preference

loki-stack:
  loki:
    persistence:
      enabled: true
      size: 20Gi
    config:
      chunk_store_config:
        max_look_back_period: 336h  # 14d
      table_manager:
        retention_deletes_enabled: true
        retention_period: 336h
