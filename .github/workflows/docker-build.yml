name: Docker Build and Push

on:
  push:
    branches:
      - main
    paths:
      - "docker/**"

permissions:
  id-token: write
  contents: read

env:
  CLOUD_PROVIDER: ${{ vars.CLOUD_PROVIDER }}  # set to 'aws' or 'gcp' in repo variables

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        if: env.CLOUD_PROVIDER == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<account>:role/github-actions-ecr-push
          aws-region: us-east-1

      - name: Login to ECR
        if: env.CLOUD_PROVIDER == 'aws'
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configure GCP credentials (OIDC)
        if: env.CLOUD_PROVIDER == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/<num>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
          service_account: github-actions-registry@gen-ai-pritha.iam.gserviceaccount.com

      - name: Login to Artifact Registry
        if: env.CLOUD_PROVIDER == 'gcp'
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev

      - name: Set image registry
        id: registry
        run: |
          if [ "${{ env.CLOUD_PROVIDER }}" = "aws" ]; then
            echo "registry=${{ steps.ecr_login.outputs.registry }}" >> $GITHUB_OUTPUT
            echo "image=${{ steps.ecr_login.outputs.registry }}/prod/demo-app" >> $GITHUB_OUTPUT
          else
            echo "image=us-central1-docker.pkg.dev/gen-ai-pritha/demo-app/demo-app" >> $GITHUB_OUTPUT
          fi

      - name: Build image
        run: |
          docker build \
            -f docker/Dockerfile \
            -t ${{ steps.registry.outputs.image }}:sha-${{ github.sha }} \
            -t ${{ steps.registry.outputs.image }}:latest \
            .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.registry.outputs.image }}:sha-${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL

      - name: Push image
        run: |
          docker push ${{ steps.registry.outputs.image }}:sha-${{ github.sha }}
          docker push ${{ steps.registry.outputs.image }}:latest

      - name: Output image tag
        id: image_tag
        run: echo "tag=sha-${{ github.sha }}" >> $GITHUB_OUTPUT

    outputs:
      image_tag: ${{ steps.image_tag.outputs.tag }}
      image: ${{ steps.registry.outputs.image }}
